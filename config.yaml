# Comic Reader Configuration

ollama:
  host: "http://localhost:11434"
  model: "llava"
  timeout: 60

voice:
  provider: "edge-tts"
  default_voice: "en-US-AriaNeural"
  default_language: "en-US"
  default_rate: 1.0  # 0.5 to 2.0
  default_pitch: 0.0  # -20 to 20

mood:
  # Sensitivity: how quickly mood escalates (0.1 to 1.0)
  escalation_sensitivity: 0.7
  
  # Mood-to-voice parameter mapping
  mood_parameters:
    contemplative:
      rate_multiplier: 0.85
      pitch_offset: -5
    
    comedic:
      rate_multiplier: 1.1
      pitch_offset: 3
    
    comedic_escalating:
      rate_multiplier: 1.15
      pitch_offset: 5
    
    comedic_peak:
      rate_multiplier: 1.2
      pitch_offset: 8
    
    comedic_resolved:
      rate_multiplier: 0.95
      pitch_offset: 0
    
    dramatic:
      rate_multiplier: 0.75
      pitch_offset: -8
    
    dramatic_building:
      rate_multiplier: 0.7
      pitch_offset: -10
    
    dramatic_climax:
      rate_multiplier: 0.65
      pitch_offset: -12
    
    dramatic_resolved:
      rate_multiplier: 0.8
      pitch_offset: -5
    
    emotional:
      rate_multiplier: 0.8
      pitch_offset: -3
    
    emotional_intensifying:
      rate_multiplier: 0.75
      pitch_offset: -5
    
    emotional_peak:
      rate_multiplier: 0.7
      pitch_offset: -8
    
    emotional_release:
      rate_multiplier: 0.85
      pitch_offset: 0
    
    action:
      rate_multiplier: 1.2
      pitch_offset: 5
    
    action_accelerating:
      rate_multiplier: 1.3
      pitch_offset: 8
    
    action_climax:
      rate_multiplier: 1.4
      pitch_offset: 10
    
    tense:
      rate_multiplier: 0.9
      pitch_offset: 0
    
    tense_escalating:
      rate_multiplier: 0.85
      pitch_offset: 2
    
    tense_peak:
      rate_multiplier: 0.8
      pitch_offset: 5
    
    tense_released:
      rate_multiplier: 1.0
      pitch_offset: -3
  
  # Intensity-based pause duration (in milliseconds)
  pause_duration_by_intensity:
    low: 500      # 0.0-0.3
    medium: 800   # 0.3-0.6
    high: 1200    # 0.6-0.9

audio:
  output_format: "mp3"
  bitrate: "192k"
  sample_rate: 44100

processing:
  batch_mode: false
  preserve_mood_state: true  # Keep mood state across batch files
  preserve_character_profiles: true  # Remember character voices across batch
  save_mood_history: true
  save_character_profiles: true
  verbose: false

characters:
  # Default character archetypes with voice profiles
  archetypes:
    protagonist:
      gender: "male"
      age_group: "young-adult"
      personality_traits: ["determined", "thoughtful"]
      base_voice: "en-US-GuyNeural"
      base_rate: 1.0
      base_pitch: 0.0
    
    female-lead:
      gender: "female"
      age_group: "young-adult"
      personality_traits: ["intelligent", "confident"]
      base_voice: "en-US-AriaNeural"
      base_rate: 1.05
      base_pitch: 0.0
    
    comic-relief:
      gender: "male"
      age_group: "young-adult"
      personality_traits: ["energetic", "playful"]
      base_voice: "en-US-ChristopherNeural"
      base_rate: 1.15
      base_pitch: 2
    
    villain:
      gender: "male"
      age_group: "adult"
      personality_traits: ["sinister", "authoritative"]
      base_voice: "en-US-GuyNeural"
      base_rate: 0.9
      base_pitch: -5
    
    mentor:
      gender: "male"
      age_group: "elderly"
      personality_traits: ["wise", "calm"]
      base_voice: "en-US-GuyNeural"
      base_rate: 0.85
      base_pitch: -8

scene:
  # LLaVA prompt templates
  extraction_prompt: |
    Analyze this comic panel. Extract:
    1. All visible text/dialogue (preserve word order and punctuation)
    2. Character actions or descriptions
    3. Sound effects or visual emphasis
    
    Format as:
    DIALOGUE: [extracted speech]
    ACTION: [what's happening]
    EFFECTS: [sound/visual elements]
  
  mood_prompt: |
    Based on this comic panel content, what is the primary emotional tone?
    Consider: dialogue, action, visual style (shading, effects), and pacing.
    
    Return ONE of: contemplative, comedic, dramatic, emotional, action, tense, peaceful
    Also provide intensity (0.0 to 1.0)
    
    Format as:
    MOOD: [mood type]
    INTENSITY: [0.0-1.0]
    REASONING: [brief explanation]